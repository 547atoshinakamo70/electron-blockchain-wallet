<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>5470 Blockchain Wallet</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; text-align: center; }
    h1 { color: #58a6ff; }
    #info, #lang { background: #161b22; padding: 20px; border-radius: 12px; width: 80%; margin: auto; margin-bottom: 15px; }
    #log { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 10px; width: 80%; height: 250px; overflow-y: auto; white-space: pre-wrap; font-size: 12px; margin: auto; }
    span.value { color: #58a6ff; font-weight: bold; }
  </style>
</head>
<body>
  <h1>5470 Blockchain Wallet</h1>

  <div id="lang">
    🌐 Idioma:
    <select id="lang-select">
      <option value="es">Español</option>
      <option value="en">English</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="zh">中文</option>
      <option value="ja">日本語</option>
      <option value="ru">Русский</option>
      <option value="ar">العربية</option>
    </select>
  </div>

  <div id="info">
    <p><label for="wallet-address">Dirección</label>: <span id="wallet-address" class="value">Cargando...</span></p>
    <p><label for="wallet-balance">Saldo</label>: <span id="wallet-balance" class="value">0</span> tokens</p>
    <p><label for="node-status">Estado nodo</label>: <span id="node-status" class="value">Iniciando...</span></p>
  </div>

  <h2>⛏ Bloques recientes</h2>
  <ul id="blocks-list"></ul>

  <h2>📜 Logs en vivo</h2>
  <pre id="log">Esperando minería...</pre>

  <button onclick="performCoinJoin()">🔄 CoinJoin</button>
  <button onclick="connectVPN()">🔐 Conectar VPN descentralizada</button>

  <script src="renderer.js"></script>
</body>
</html>
